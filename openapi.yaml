openapi: 3.0.3
info:
  title: Task Manager API
  version: 1.0.0
servers:
  - url: http://localhost:8080
paths:
  /api/v1/tasks:
    get:
      summary: List tasks
      parameters:
        - in: query
          name: delay
          schema:
            type: string
          description: "Учебная симуляция задержки, например 200ms или 2s"
      responses:
        "200":
          description: OK
          headers:
            X-Request-ID:
              schema: { type: string }
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Task" }
    post:
      summary: Create task
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateTaskRequest" }
      responses:
        "201":
          description: Created
          headers:
            Location:
              schema: { type: string }
            X-Request-ID:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "400":
          $ref: "#/components/responses/Error400"
        "413":
          $ref: "#/components/responses/Error413"
  /api/v1/tasks/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    get:
      summary: Get task by id
      responses:
        "200":
          description: OK
          headers:
            X-Request-ID:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "404":
          $ref: "#/components/responses/Error404"
    put:
      summary: Update task
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateTaskRequest" }
      responses:
        "200":
          description: OK
          headers:
            X-Request-ID:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "400":
          $ref: "#/components/responses/Error400"
        "404":
          $ref: "#/components/responses/Error404"
        "413":
          $ref: "#/components/responses/Error413"
    delete:
      summary: Delete task
      security:
        - basicAuth: []
      responses:
        "204":
          description: No Content
          headers:
            X-Request-ID:
              schema: { type: string }
        "401":
          $ref: "#/components/responses/Error401"
        "404":
          $ref: "#/components/responses/Error404"

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic

  schemas:
    Task:
      type: object
      required: [id, title, done, priority]
      properties:
        id: { type: integer }
        title: { type: string, maxLength: 100 }
        done: { type: boolean }
        priority: { type: string, enum: [low, medium, high] }

    CreateTaskRequest:
      type: object
      required: [title, done, priority]
      properties:
        title: { type: string, maxLength: 100 }
        done: { type: boolean }
        priority: { type: string, enum: [low, medium, high] }

    UpdateTaskRequest:
      type: object
      required: [title, done, priority]
      properties:
        title: { type: string, maxLength: 100 }
        done: { type: boolean }
        priority: { type: string, enum: [low, medium, high] }

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            request_id: { type: string }
            details: { nullable: true }

  responses:
    Error400:
      description: Bad Request
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Error401:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Error404:
      description: Not Found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Error413:
      description: Payload Too Large
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
